- name: BAStudio summary
  ansible.builtin.debug:
    msg:
      - "BAStudio ready at https://{{ baw_hostname }}/bas/"
      - "Case Manager : https://{{ baw_hostname }}/bas/CaseManager"
      - "Admin user   : {{ ums_admin_user }}"
