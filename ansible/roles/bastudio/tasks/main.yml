---
# Role: bastudio
# Deploys IBM BAStudio (Business Automation Workflow — authoring) 25.0.1
#
# Image: cp.icr.io/cp/cp4a/bas/workflow-authoring:25.0.1
#
# How the image works (verified by introspection):
#   - Liberty runtime managed by supervisord
#   - ALL configuration via Liberty variable substitution (${variable}) in
#     configDropins/defaults/*.xml; overrides go in configDropins/overrides/
#   - Default datasource is DB2; override with PostgreSQL via datasource.xml
#   - DB schema created by: /opt/ibm/wlp/ibmProcessServer/bin/dbConfig defaultServer -create
#   - No bootstrap.sh / content_init.sh / etc. — those scripts do not exist
#   - OIDC, UMS JAAS, FileNet JAAS, LTPA all handled by defaults once
#     variables are supplied
#   - mpHealth endpoint at /health (probe directly against pod port 9080)
#   - Context root prefix set to /bas to match OpenShift route
#
# Sequence:
#   1. bastudio-secret        — all passwords as env vars
#   2. bastudio-liberty-config ConfigMap — four override XML files
#   3. PVCs
#   4. bastudio-db-init Job   — dbConfig defaultServer -create (PostgreSQL schema)
#   5. BAStudio Deployment + Service

# ── Secrets ───────────────────────────────────────────────────────────────────

- name: Create BAStudio credentials Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: bastudio-secret
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      stringData:
        BAS_ADMIN_PASSWORD:          "{{ ums_admin_password }}"
        BAS_DB_USER:                 "{{ bas_db_user }}"
        BAS_DB_PASS:                 "{{ bas_db_pass }}"
        LDAP_BIND_PASSWORD:          "{{ ldap_bind_password }}"
        KEYSTORE_PASSWORD:           "{{ keystore_password }}"
        BASTUDIO_OIDC_CLIENT_SECRET: "{{ bastudio_oidc_client_secret }}"
  no_log: true

# ── Liberty config overrides ──────────────────────────────────────────────────
# Four files land in configDropins/overrides/ and override the built-in defaults.
#
# processServer_variables.xml  — supplies every ${variable} used by default configs
# datasource.xml               — replaces the default DB2 datasource with PostgreSQL
# ssl.xml                      — points defaultKeyStore/TrustStore to our PKCS12 files
# ldap-registry.xml            — WIM LDAP integration (baseDN = ldap_user_base, rdnProperty = cn)

- name: Create BAStudio Liberty config ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: bastudio-liberty-config
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      data:
        processServer_variables.xml: |
          <?xml version="1.0" encoding="UTF-8"?>
          <server>
            <!-- ── Host / ports ───────────────────────────────── -->
            <variable name="hostname"              value="{{ baw_hostname }}"/>
            <variable name="http_port"             value="-1"/>
            <variable name="https_port"            value="443"/>
            <variable name="external_hostname"     value="{{ baw_hostname }}"/>
            <variable name="external_https_port"   value="443"/>

            <!-- ── Context root — must match the /bas OpenShift route ── -->
            <variable name="baw_context_root_prefix" value="/bas"/>

            <!-- ── Admin credentials ─────────────────────────── -->
            <variable name="admin_user"            value="{{ ums_admin_user }}"/>
            <variable name="admin_password"        value="${env.BAS_ADMIN_PASSWORD}"/>

            <!-- ── Database ──────────────────────────────────── -->
            <variable name="db_type"               value="PostgreSQL"/>
            <variable name="db_name"               value="{{ bas_db_name }}"/>
            <variable name="db_host"               value="{{ postgres_host }}"/>
            <variable name="db_port"               value="{{ postgres_port }}"/>
            <variable name="db_user"               value="${env.BAS_DB_USER}"/>
            <variable name="db_password"           value="${env.BAS_DB_PASS}"/>
            <variable name="db_check_wait_time"    value="300"/>
            <variable name="db_check_interval_time" value="10"/>

            <!-- ── OIDC client (registered as 'bastudio' in UMS) ── -->
            <variable name="client_id"             value="bastudio"/>
            <variable name="client_secret"         value="${env.BASTUDIO_OIDC_CLIENT_SECRET}"/>

            <!-- ── UMS ───────────────────────────────────────── -->
            <variable name="ums_hostname"          value="{{ baw_hostname }}"/>
            <variable name="ums_port"              value="443"/>
            <variable name="ums_admin_user"        value="{{ ums_admin_user }}"/>
            <variable name="ums_admin_password"    value="${env.BAS_ADMIN_PASSWORD}"/>
            <!--
              ums_urlprefix         : used for browser-facing OIDC authorize redirect
              ums_urlprefix_service_sso : used for server-to-server token/introspect/jwk calls
            -->
            <variable name="ums_urlprefix"         value="https://{{ baw_hostname }}"/>
            <variable name="ums_urlprefix_service_sso"
                                                   value="https://ums-svc.{{ baw_namespace }}.svc.cluster.local:9443"/>

            <!-- ── SSL / LTPA ─────────────────────────────────── -->
            <variable name="ssl_keystore_password" value="${env.KEYSTORE_PASSWORD}"/>

            <!-- ── Automation service user ──────────────────── -->
            <variable name="automation_service_user"     value="{{ ums_admin_user }}"/>
            <variable name="automation_service_password" value="${env.BAS_ADMIN_PASSWORD}"/>

            <!-- ── Delivery type ─────────────────────────────── -->
            <variable name="delivery_type"         value="baw"/>

            <!-- ── JMS (single-server: loopback) ─────────────── -->
            <variable name="jms_server_host"       value="127.0.0.1"/>
          </server>

        datasource.xml: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!--
            Overrides the default DB2 datasource with PostgreSQL.
            Same id="jdbc/TeamWorksDB" merges with — and wins over — the default.
            The built-in PostgreSQL JDBC driver is at:
              ${wlp.install.dir}/ibmProcessServer/lib/jdbcdrivers/PostgreSQL/postgresql.jar
          -->
          <server>
            <library id="postgresqlJDBCLib">
              <fileset dir="${wlp.install.dir}/ibmProcessServer/lib/jdbcdrivers/PostgreSQL"
                       includes="postgresql.jar"/>
            </library>

            <dataSource commitOrRollbackOnCleanup="commit"
                        id="jdbc/TeamWorksDB"
                        jndiName="jdbc/TeamWorksDB"
                        isolationLevel="TRANSACTION_READ_COMMITTED"
                        type="javax.sql.XADataSource">
              <connectionManager maxPoolSize="50" minPoolSize="1"/>
              <jdbcDriver javax.sql.XADataSource="org.postgresql.xa.PGXADataSource"
                          libraryRef="postgresqlJDBCLib"/>
              <properties.postgresql
                databaseName="${db_name}"
                serverName="${db_host}"
                portNumber="${db_port}"
                user="${db_user}"
                password="${db_password}"/>
            </dataSource>
          </server>

        ssl.xml: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!--
            Overrides the default ssl.xml to point Liberty at our PKCS12 files
            mounted from the shared-ssl-config ConfigMap at /shared/tls/pkcs12/.
            Uses ssl_keystore_password variable (supplied via processServer_variables.xml).
          -->
          <server>
            <keyStore id="defaultKeyStore"
              location="/shared/tls/pkcs12/server.p12"
              password="${ssl_keystore_password}"
              type="PKCS12"
              updateTrigger="polled"
              pollingRate="5000ms"/>

            <keyStore id="defaultTrustStore"
              location="/shared/tls/pkcs12/trusts.p12"
              password="${ssl_keystore_password}"
              type="PKCS12"/>

            <ssl id="defaultSSLConfig"
              keyStoreRef="defaultKeyStore"
              trustStoreRef="defaultTrustStore"
              sslProtocol="TLSv1.2"/>

            <sslDefault sslRef="defaultSSLConfig"/>
          </server>

        ldap-registry.xml: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!--
            Federated LDAP registry for ISVD.
            baseDN = ldap_user_base (ou=dev,dc=demodom,dc=nl) — NOT ldap_base_dn.
            rdnProperty = cn — Liberty constructs bind DN as cn=<user>,ou=dev,...
          -->
          <server>
            <ldapRegistry id="LDAPUserRegistry"
              realm="defaultWIMFileBasedRealm"
              host="{{ ldap_host }}"
              port="{{ ldap_port }}"
              baseDN="{{ ldap_user_base }}"
              bindDN="{{ ldap_bind_dn }}"
              bindPassword="${env.LDAP_BIND_PASSWORD}"
              ldapType="Custom">
              <ldapEntityType name="PersonAccount">
                <rdnProperty name="cn"/>
                <objectClass>inetOrgPerson</objectClass>
              </ldapEntityType>
              <ldapEntityType name="Group">
                <rdnProperty name="cn"/>
                <objectClass>groupOfNames</objectClass>
                <memberAttribute name="member"/>
              </ldapEntityType>
              <userFilter
                filter="(&amp;(uid=%v)(objectclass=inetOrgPerson))"/>
              <groupFilter
                filter="(&amp;(cn=%v)(objectclass=groupOfNames))"/>
              <userIdMap filter="uid"/>
              <groupIdMap filter="cn"/>
              <groupMemberIdMap filter="member"/>
            </ldapRegistry>
          </server>

- name: Create BAStudio fix-java-security ConfigMap (startup hook)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: bastudio-startup-scripts
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      data:
        00-fix-java-security.sh: |
          #!/bin/bash
          # Fix IBM Semeru 21 java.security for BAW container.
          #
          # Problem: The image's java.security lists IBM-proprietary providers
          # (IBMJCE, IBMJSSEProvider2 etc.) that do NOT exist in IBM Semeru
          # Certified Edition (OpenJDK-based). Provider 10 (sun.security.provider.Sun)
          # is restricted to FIPS/RestrictedSecurity mode with the '#' suffix.
          # baw-setup.sh tries to fix this via security_provider_disable_IBMJCEFIPS,
          # but that file lacks a trailing newline, so the last line merges with the
          # next '#' comment in java.security and Sun ends up restricted again.
          #
          # Fix: replace the entire provider list with standard OpenJDK providers.
          # This runs in the liberty-start.sh pre-start hook (shared/scripts/*.sh),
          # AFTER baw-setup.sh and BEFORE the Liberty JVM reads java.security.

          SEC=/opt/ibm/java/conf/security/java.security

          # Write the correct provider list to a temp file (heredoc guarantees
          # a proper trailing newline — no merge issue).
          cat > /tmp/jdk_providers.txt << 'PROVIDERS'
          security.provider.1=sun.security.provider.Sun
          security.provider.2=sun.security.rsa.SunRsaSign
          security.provider.3=sun.security.ec.SunEC
          security.provider.4=sun.security.ssl.SunJSSE
          security.provider.5=com.sun.crypto.provider.SunJCE
          security.provider.6=sun.security.jgss.SunProvider
          security.provider.7=com.sun.security.sasl.Provider
          security.provider.8=org.jcp.xml.dsig.internal.dom.XMLDSigRI
          PROVIDERS

          # Remove all existing security.provider.N= lines (any digit count).
          sed -i '/^security\.provider\.[0-9]/d' "$SEC"

          # Insert the new provider list after the canonical comment anchor.
          sed -i "/# List of providers and their preference orders (see above):/r /tmp/jdk_providers.txt" "$SEC"

          echo "00-fix-java-security: java.security providers replaced with standard JDK providers"

# ── Storage ───────────────────────────────────────────────────────────────────

- name: Create BAStudio data PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: bastudio-pvc
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      spec:
        accessModes: [ReadWriteMany]
        resources:
          requests:
            storage: 20Gi
        storageClassName: "{{ storage_class_name }}"

- name: Create BAStudio logs PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: bastudio-logs-pvc
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      spec:
        accessModes: [ReadWriteMany]
        resources:
          requests:
            storage: 5Gi
        storageClassName: "{{ storage_class_name }}"

# ── DB init Job ───────────────────────────────────────────────────────────────
# Runs dbConfig defaultServer -create to initialise the BAW PostgreSQL schema.
# Only needs the DB-related overrides (processServer_variables.xml + datasource.xml)
# and the secret env vars for db_user / db_password.

- name: Delete previous db-init Job (if any)
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: bastudio-db-init
        namespace: "{{ baw_namespace }}"
  ignore_errors: true

- name: Run BAStudio DB init Job (dbConfig defaultServer -create)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: bastudio-db-init
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      spec:
        backoffLimit: 2
        template:
          metadata:
            labels:
              app: baw-bastudio-job
          spec:
            imagePullSecrets:
              - name: ibm-entitlement-key
            restartPolicy: Never
            securityContext:
              runAsUser: 1000140000
              fsGroup: 1000140000
            containers:
              - name: bastudio-db-init
                image: "{{ bastudio_image }}"
                imagePullPolicy: IfNotPresent
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Starting BAW DB initialisation..."
                    /opt/ibm/wlp/ibmProcessServer/bin/dbConfig defaultServer -create
                    RC=$?
                    echo "dbConfig exit code: $RC"
                    exit $RC
                env:
                  - name: BAS_ADMIN_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: BAS_ADMIN_PASSWORD
                  - name: BAS_DB_USER
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: BAS_DB_USER
                  - name: BAS_DB_PASS
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: BAS_DB_PASS
                  - name: KEYSTORE_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: KEYSTORE_PASSWORD
                  - name: BASTUDIO_OIDC_CLIENT_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: BASTUDIO_OIDC_CLIENT_SECRET
                  - name: LDAP_BIND_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: LDAP_BIND_PASSWORD
                  - name: LIBERTY_SERVER_NAME
                    value: "defaultServer"
                  - name: DB_TYPE
                    value: "POSTGRESQL"
                  - name: disableFIPS
                    value: "true"
                  - name: IBMJCEPLUS_FIPS_ENABLED
                    value: "false"
                  - name: TZ
                    value: "{{ timezone }}"
                volumeMounts:
                  - name: liberty-config
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/configDropins/overrides/processServer_variables.xml
                    subPath: processServer_variables.xml
                  - name: liberty-config
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/configDropins/overrides/datasource.xml
                    subPath: datasource.xml
            volumes:
              - name: liberty-config
                configMap:
                  name: bastudio-liberty-config

- name: Wait for DB init Job to complete
  ansible.builtin.shell: >
    oc wait job/bastudio-db-init
    -n {{ baw_namespace }}
    --for=condition=complete
    --timeout={{ bastudio_job_timeout }}s
  changed_when: false

# ── BAStudio Deployment ───────────────────────────────────────────────────────

- name: Deploy BAStudio
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: bastudio
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: baw-bastudio
        template:
          metadata:
            labels:
              app: baw-bastudio
          spec:
            imagePullSecrets:
              - name: ibm-entitlement-key
            securityContext:
              runAsUser: 1000140000
              fsGroup: 1000140000
            containers:
              - name: bastudio
                image: "{{ bastudio_image }}"
                imagePullPolicy: IfNotPresent
                ports:
                  - containerPort: 9080
                    name: http
                  - containerPort: 9443
                    name: https
                env:
                  - name: BAS_ADMIN_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: BAS_ADMIN_PASSWORD
                  - name: BAS_DB_USER
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: BAS_DB_USER
                  - name: BAS_DB_PASS
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: BAS_DB_PASS
                  - name: LDAP_BIND_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: LDAP_BIND_PASSWORD
                  - name: KEYSTORE_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: KEYSTORE_PASSWORD
                  - name: BASTUDIO_OIDC_CLIENT_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: bastudio-secret
                        key: BASTUDIO_OIDC_CLIENT_SECRET
                  - name: LIBERTY_SERVER_NAME
                    value: "defaultServer"
                  - name: DB_TYPE
                    value: "POSTGRESQL"
                  - name: disableFIPS
                    value: "true"
                  - name: IBMJCEPLUS_FIPS_ENABLED
                    value: "false"
                  - name: TZ
                    value: "{{ timezone }}"
                  - name: JVM_HEAP_XMS
                    value: "1024m"
                  - name: JVM_HEAP_XMX
                    value: "2048m"
                resources:
                  requests:
                    memory: 2Gi
                    cpu: 500m
                  limits:
                    memory: 4Gi
                    cpu: "2"
                # mpHealth-1.0 serves at /health directly on the pod (not via route).
                # Kubernetes probes bypass the OpenShift router, so the /bas route
                # prefix does NOT apply here.
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 9080
                    scheme: HTTP
                  initialDelaySeconds: 180
                  periodSeconds: 30
                  failureThreshold: 10
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 9080
                    scheme: HTTP
                  initialDelaySeconds: 120
                  periodSeconds: 15
                  failureThreshold: 20
                startupProbe:
                  httpGet:
                    path: /health
                    port: 9080
                    scheme: HTTP
                  periodSeconds: 15
                  failureThreshold: 80
                volumeMounts:
                  - name: data
                    mountPath: /opt/ibm/bas/data
                  - name: logs
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/logs
                  - name: overrides-dir
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/configDropins/overrides
                  - name: liberty-config
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/configDropins/overrides/processServer_variables.xml
                    subPath: processServer_variables.xml
                  - name: liberty-config
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/configDropins/overrides/datasource.xml
                    subPath: datasource.xml
                  - name: liberty-config
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/configDropins/overrides/ssl.xml
                    subPath: ssl.xml
                  - name: liberty-config
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/configDropins/overrides/ldap-registry.xml
                    subPath: ldap-registry.xml
                  - name: tls
                    mountPath: /shared/tls/pkcs12
                  - name: startup-scripts
                    mountPath: /shared/scripts/00-fix-java-security.sh
                    subPath: 00-fix-java-security.sh
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: bastudio-pvc
              - name: logs
                persistentVolumeClaim:
                  claimName: bastudio-logs-pvc
              - name: overrides-dir
                emptyDir: {}
              - name: liberty-config
                configMap:
                  name: bastudio-liberty-config
              - name: tls
                configMap:
                  name: shared-ssl-config
                  items:
                    - key: server.p12
                      path: server.p12
                    - key: trusts.p12
                      path: trusts.p12
              - name: startup-scripts
                configMap:
                  name: bastudio-startup-scripts
                  defaultMode: 0755

- name: Create BAStudio Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: bastudio-svc
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      spec:
        selector:
          app: baw-bastudio
        ports:
          - port: 9080
            targetPort: 9080
            name: http
          - port: 9443
            targetPort: 9443
            name: https

- name: Wait for BAStudio deployment to be ready
  ansible.builtin.shell: >
    oc rollout status deployment/bastudio
    -n {{ baw_namespace }} --timeout={{ pod_ready_timeout }}s
  changed_when: false

- name: BAStudio summary
  ansible.builtin.debug:
    msg:
      - "BAStudio ready"
      - "  BAStudio   : https://{{ baw_hostname }}/bas/BAStudio"
      - "  WorkflowCtr: https://{{ baw_hostname }}/bas/WorkflowCenter"
      - "  ProcessAdmin: https://{{ baw_hostname }}/bas/ProcessAdmin"
      - "  REST APIs  : https://{{ baw_hostname }}/bas/bpm/..."
      - "  Admin user : {{ ums_admin_user }}"
