  ignore_errors: true

- name: Run BAStudio content-init Job
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: bastudio-content-init
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      spec:
        backoffLimit: 2
        template:
          metadata:
            labels:
              app: baw-bastudio-job
          spec:
            imagePullSecrets:
              - name: ibm-entitlement-key
            restartPolicy: Never
            securityContext:
              runAsUser: 1000140000
              fsGroup: 1000140000
            containers:
              - name: bastudio-content-init
                image: "{{ bastudio_image }}"
                imagePullPolicy: IfNotPresent
                command: ["/bin/sh", "-c", "/opt/ibm/scripts/content_init.sh"]
                envFrom:
                  - secretRef:
                      name: bastudio-secret
                  - configMapRef:
                      name: bastudio-bootstrap-config
                env:
                  - name: disableFIPS
                    value: "true"
                  - name: TZ
                    value: "{{ timezone }}"
                volumeMounts:
                  - name: tls
                    mountPath: /shared/tls/pkcs12
            volumes:
              - name: tls
                configMap:
                  name: shared-ssl-config
                  items:
                    - key: server.p12
                      path: server.p12
                    - key: trusts.p12
                      path: trusts.p12

- name: Wait for content-init Job to complete
  ansible.builtin.shell: >
    oc wait job/bastudio-content-init
    -n {{ baw_namespace }}
    --for=condition=complete
    --timeout={{ bastudio_job_timeout }}s
  changed_when: false

# ── Step 3: BAStudio Deployment ───────────────────────────────────────────────

- name: Deploy BAStudio
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: bastudio
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: baw-bastudio
        template:
          metadata:
            labels:
              app: baw-bastudio
          spec:
            imagePullSecrets:
              - name: ibm-entitlement-key
            securityContext:
              runAsUser: 1000140000
              fsGroup: 1000140000
            containers:
              - name: bastudio
                image: "{{ bastudio_image }}"
                imagePullPolicy: IfNotPresent
                ports:
                  - containerPort: 9080
                    name: http
                  - containerPort: 9443
                    name: https
                envFrom:
                  - secretRef:
                      name: bastudio-secret
                  - configMapRef:
                      name: bastudio-bootstrap-config
                env:
                  - name: disableFIPS
                    value: "true"
                  - name: TZ
                    value: "{{ timezone }}"
                  - name: JVM_HEAP_XMS
                    value: "1024m"
                  - name: JVM_HEAP_XMX
                    value: "2048m"
                resources:
                  requests:
                    memory: 2Gi
                    cpu: 500m
                  limits:
                    memory: 4Gi
                    cpu: "2"
                livenessProbe:
                  httpGet:
                    path: /bas/health
                    port: 9080
                    scheme: HTTP
                  initialDelaySeconds: 120
                  periodSeconds: 30
                  failureThreshold: 10
                readinessProbe:
                  httpGet:
                    path: /bas/health
                    port: 9080
                    scheme: HTTP
                  initialDelaySeconds: 90
                  periodSeconds: 15
                  failureThreshold: 20
                startupProbe:
                  httpGet:
                    path: /bas/health
                    port: 9080
                    scheme: HTTP
                  periodSeconds: 15
                  failureThreshold: 60
                volumeMounts:
                  - name: data
                    mountPath: /opt/ibm/bas/data
                  - name: logs
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/logs
                  - name: liberty-config
                    mountPath: /opt/ibm/wlp/usr/servers/defaultServer/configDropins/overrides
                  - name: tls
                    mountPath: /shared/tls/pkcs12
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: bastudio-pvc
              - name: logs
                persistentVolumeClaim:
                  claimName: bastudio-logs-pvc
              - name: liberty-config
                configMap:
                  name: bastudio-liberty-config
              - name: tls
                configMap:
                  name: shared-ssl-config
                  items:
                    - key: server.p12
                      path: server.p12
                    - key: trusts.p12
                      path: trusts.p12

- name: Create BAStudio Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: bastudio-svc
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-bastudio
      spec:
        selector:
          app: baw-bastudio
        ports:
          - port: 9080
            targetPort: 9080
            name: http
          - port: 9443
            targetPort: 9443
            name: https

- name: Wait for BAStudio deployment
  ansible.builtin.shell: >
    oc rollout status deployment/bastudio
    -n {{ baw_namespace }} --timeout={{ pod_ready_timeout }}s
  changed_when: false

