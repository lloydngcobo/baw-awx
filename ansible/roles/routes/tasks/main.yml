---
# Role: routes
# Creates OpenShift passthrough TLS Routes for all BAW services.
# All routes land on baw_hostname (baw.apps.homelab.home.nl) with path-based routing.
# Services use passthrough termination — pods handle TLS themselves.
#
# Route layout:
#   /acce/                       → cpe-svc:9443
#   /navigator/                  → icn-svc:9443       (when deploy_icn)
#   /content-services-graphql/   → graphql-svc:9443   (when deploy_graphql)
#   /ums/                        → ums-svc:9443        (when deploy_ums)
#   /bas/                        → bastudio-svc:9443   (when deploy_bastudio)
#   /baw/                        → baw-runtime-svc:9443 (when deploy_baw_runtime)

- name: Create CPE ACCE route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: cpe-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /acce
        port:
          targetPort: https
        tls:
          termination: passthrough
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: cpe-svc

- name: Create CPE WSI route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: cpe-wsi-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /wsi
        port:
          targetPort: https
        tls:
          termination: passthrough
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: cpe-svc

- name: Create ICN Navigator route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: icn-route
        namespace: "{{ baw_namespace }}"
