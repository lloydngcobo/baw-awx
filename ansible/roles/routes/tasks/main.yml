  when: deploy_baw_runtime | default(false) | bool

- name: Routes summary
  ansible.builtin.debug:
    msg:
      - "Routes created on host: {{ baw_hostname }}"
      - "  CPE ACCE   : https://{{ baw_hostname }}/acce/"
      - "  ICN        : https://{{ baw_hostname }}/navigator/"
      - "  GraphQL    : https://{{ baw_hostname }}/content-services-graphql/"
      - "  UMS        : https://{{ baw_hostname }}/ums/"
      - "  BAStudio   : https://{{ baw_hostname }}/bas/"
