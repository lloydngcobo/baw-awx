---
# Role: routes
# Creates OpenShift Routes for all BAW services.
#
# Termination strategy:
#   edge     — pods that serve BOTH HTTP (9080) and HTTPS: CPE, ICN, GraphQL, BAStudio, BAW-RT.
#              The router terminates TLS with its wildcard *.apps cert and forwards plain
#              HTTP to port 9080. insecureEdgeTerminationPolicy=Redirect forces http→https.
#   reencrypt — pods that serve HTTPS ONLY (httpPort=-1): UMS.
#              The router terminates the client's TLS, then re-encrypts toward the pod
#              using the destinationCACertificate (BAW Root CA from shared-ssl-config).
#
# Route layout:
#   /acce/                       → cpe-svc:9080        (edge)
#   /wsi/                        → cpe-svc:9080        (edge)
#   /navigator/                  → icn-svc:9080        (edge, when deploy_icn)
#   /content-services-graphql/   → graphql-svc:9080    (edge, when deploy_graphql)
#   /ums/                        → ums-svc:9443        (reencrypt, when deploy_ums)
#   /oidc/                       → ums-svc:9443        (reencrypt, when deploy_ums)
#   /ibm/                        → ums-svc:9443        (reencrypt, when deploy_ums)
#   /bas/                        → bastudio-svc:9080   (edge, when deploy_bastudio)
#   /baw/                        → baw-runtime-svc:9080 (edge, when deploy_baw_runtime)

# Fetch the BAW Root CA cert so it can be embedded as destinationCACertificate
# for reencrypt routes. Uses the shared-ssl-config ConfigMap (always created by
# the certificates role), making this role independently runnable.
- name: Get shared-ssl-config ConfigMap for CA cert
  kubernetes.core.k8s_info:
    kind: ConfigMap
    name: shared-ssl-config
    namespace: "{{ baw_namespace }}"
  register: _ssl_cm
  when: deploy_ums | default(true) | bool

- name: Set BAW CA cert fact
  ansible.builtin.set_fact:
    _baw_ca_cert: "{{ _ssl_cm.resources[0].data['ca.crt'] }}"
  when: deploy_ums | default(true) | bool

- name: Create CPE ACCE route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: cpe-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /acce
        port:
          targetPort: http
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: cpe-svc

- name: Create CPE WSI route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: cpe-wsi-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /wsi
        port:
          targetPort: http
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: cpe-svc

- name: Create ICN Navigator route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: icn-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /navigator
        port:
          targetPort: http
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: icn-svc
  when: deploy_icn | default(true) | bool

- name: Create GraphQL route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: graphql-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /content-services-graphql
        port:
          targetPort: http
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: graphql-svc
  when: deploy_graphql | default(true) | bool

# UMS serves HTTPS only (httpPort=-1), so all UMS routes use reencrypt termination
# (edge termination requires pod to serve HTTP on port 9080, which UMS does not).
# Three separate routes cover the UMS surface area:
#   /ums            → UMS UI and admin endpoints
#   /oidc           → OIDC/OAuth2 authorize, token, introspect endpoints
#   /ibm            → SCIM and Liberty explorer endpoints

- name: Create UMS UI route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: ums-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /ums
        port:
          targetPort: https
        tls:
          termination: reencrypt
          insecureEdgeTerminationPolicy: Redirect
          destinationCACertificate: "{{ _baw_ca_cert }}"
        to:
          kind: Service
          name: ums-svc
  when: deploy_ums | default(true) | bool

- name: Create UMS OIDC route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: ums-oidc-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /oidc
        port:
          targetPort: https
        tls:
          termination: reencrypt
          insecureEdgeTerminationPolicy: Redirect
          destinationCACertificate: "{{ _baw_ca_cert }}"
        to:
          kind: Service
          name: ums-svc
  when: deploy_ums | default(true) | bool

- name: Create UMS IBM-API route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: ums-ibm-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /ibm
        port:
          targetPort: https
        tls:
          termination: reencrypt
          insecureEdgeTerminationPolicy: Redirect
          destinationCACertificate: "{{ _baw_ca_cert }}"
        to:
          kind: Service
          name: ums-svc
  when: deploy_ums | default(true) | bool

- name: Create BAStudio route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: bastudio-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /bas
        port:
          targetPort: http
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: bastudio-svc
  when: deploy_bastudio | default(true) | bool

- name: Create BAW Runtime route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: baw-runtime-route
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw
      spec:
        host: "{{ baw_hostname }}"
        path: /baw
        port:
          targetPort: http
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: baw-runtime-svc
  when: deploy_baw_runtime | default(false) | bool

- name: Routes summary
  ansible.builtin.debug:
    msg:
      - "Routes created on host: {{ baw_hostname }}"
      - "  CPE ACCE   : https://{{ baw_hostname }}/acce/"
      - "  ICN        : https://{{ baw_hostname }}/navigator/"
      - "  GraphQL    : https://{{ baw_hostname }}/content-services-graphql/"
      - "  UMS        : https://{{ baw_hostname }}/ums/"
      - "  BAStudio   : https://{{ baw_hostname }}/bas/"
