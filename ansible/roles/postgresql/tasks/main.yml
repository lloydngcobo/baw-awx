        psql -U {{ postgres_admin_user }} -d {{ postgres_db }} <<'EOSQL'
    CREATE ROLE {{ tos_db_user }} WITH INHERIT LOGIN ENCRYPTED PASSWORD '{{ tos_db_pass }}';
    CREATE TABLESPACE {{ tos_db_name }}_tbs OWNER {{ tos_db_user }}
      LOCATION '/var/lib/pgsql/data/{{ tos_db_name }}/data';
    CREATE DATABASE {{ tos_db_name }} OWNER {{ tos_db_user }}
      TABLESPACE {{ tos_db_name }}_tbs TEMPLATE template0 ENCODING UTF8;
