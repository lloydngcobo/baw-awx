        psql -U {{ postgres_admin_user }} -d {{ postgres_db }} <<'EOSQL'
    CREATE ROLE {{ dos_db_user }} WITH INHERIT LOGIN ENCRYPTED PASSWORD '{{ dos_db_pass }}';
    CREATE TABLESPACE {{ dos_db_name }}_tbs OWNER {{ dos_db_user }}
      LOCATION '/var/lib/pgsql/data/{{ dos_db_name }}/data';
    CREATE DATABASE {{ dos_db_name }} OWNER {{ dos_db_user }}
      TABLESPACE {{ dos_db_name }}_tbs TEMPLATE template0 ENCODING UTF8;
    GRANT ALL ON DATABASE {{ dos_db_name }} TO {{ dos_db_user }};
    EOSQL
        echo 'CREATED')"
