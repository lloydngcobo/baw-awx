  when: deploy_bastudio | default(true) | bool

- name: Create BAW Runtime databases
  ansible.builtin.shell: |
    oc exec -n {{ infra_namespace }} {{ _pg_pod.stdout }} -- bash -c "
      psql -U {{ postgres_admin_user }} -d {{ postgres_db }} -tc \
        \"SELECT 1 FROM pg_database WHERE datname='{{ item.db }}'\" \
        | grep -q 1 && echo 'EXISTS' || (
        mkdir -p /var/lib/pgsql/data/{{ item.db }}
        psql -U {{ postgres_admin_user }} -d {{ postgres_db }} <<EOSQL
    CREATE ROLE {{ item.user }} WITH INHERIT LOGIN ENCRYPTED PASSWORD '{{ item.pass }}';
    CREATE TABLESPACE {{ item.db }}_tbs OWNER {{ item.user }}
      LOCATION '/var/lib/pgsql/data/{{ item.db }}';
    CREATE DATABASE {{ item.db }} OWNER {{ item.user }}
      TABLESPACE {{ item.db }}_tbs TEMPLATE template0 ENCODING UTF8;
    GRANT ALL ON DATABASE {{ item.db }} TO {{ item.user }};
    EOSQL
        echo 'CREATED')"
  register: _baw_rt
  changed_when: "'CREATED' in _baw_rt.stdout"
  no_log: true
  loop:
    - { db: "{{ baw_rt_db_name }}",  user: "{{ baw_rt_db_user }}",  pass: "{{ baw_rt_db_pass }}" }
    - { db: "{{ baw_pdw_db_name }}", user: "{{ baw_pdw_db_user }}", pass: "{{ baw_pdw_db_pass }}" }
  when: deploy_baw_runtime | default(false) | bool

- name: Create App Engine database
  ansible.builtin.shell: |
    oc exec -n {{ infra_namespace }} {{ _pg_pod.stdout }} -- bash -c "
      psql -U {{ postgres_admin_user }} -d {{ postgres_db }} -tc \
