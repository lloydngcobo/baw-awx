- name: Create ICN database
  ansible.builtin.shell: |
    oc exec -n {{ infra_namespace }} {{ _pg_pod.stdout }} -- bash -c "
      psql -U {{ postgres_admin_user }} -d {{ postgres_db }} -tc \
        \"SELECT 1 FROM pg_database WHERE datname='{{ icn_db_name }}'\" \
        | grep -q 1 && echo 'EXISTS' || (
        mkdir -p /var/lib/pgsql/data/{{ icn_db_name }}
        psql -U {{ postgres_admin_user }} -d {{ postgres_db }} <<'EOSQL'
    CREATE ROLE {{ icn_db_user }} WITH INHERIT LOGIN ENCRYPTED PASSWORD '{{ icn_db_pass }}';
    CREATE TABLESPACE {{ icn_db_name }}_tbs OWNER {{ icn_db_user }}
      LOCATION '/var/lib/pgsql/data/{{ icn_db_name }}';
    CREATE DATABASE {{ icn_db_name }} OWNER {{ icn_db_user }}
      TABLESPACE {{ icn_db_name }}_tbs TEMPLATE template0 ENCODING UTF8;
    GRANT ALL ON DATABASE {{ icn_db_name }} TO {{ icn_db_user }};
    \c {{ icn_db_name }}
    CREATE SCHEMA IF NOT EXISTS icn_schema AUTHORIZATION {{ icn_db_user }};
    ALTER DATABASE {{ icn_db_name }} SET search_path TO icn_schema;
    EOSQL
        echo 'CREATED')"
  register: _icn
  changed_when: "'CREATED' in _icn.stdout"
  no_log: true
  when: deploy_icn | default(true) | bool

