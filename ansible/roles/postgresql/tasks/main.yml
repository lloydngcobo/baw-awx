      LOCATION '/var/lib/pgsql/data/{{ bas_db_name }}';
    CREATE DATABASE {{ bas_db_name }} OWNER {{ bas_db_user }}
      TABLESPACE {{ bas_db_name }}_tbs TEMPLATE template0 ENCODING UTF8;
    GRANT ALL ON DATABASE {{ bas_db_name }} TO {{ bas_db_user }};
