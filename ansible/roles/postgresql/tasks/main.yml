    CREATE ROLE {{ aae_db_user }} WITH INHERIT LOGIN ENCRYPTED PASSWORD '{{ aae_db_pass }}';
    CREATE TABLESPACE {{ aae_db_name }}_tbs OWNER {{ aae_db_user }}
      LOCATION '/var/lib/pgsql/data/{{ aae_db_name }}';
    CREATE DATABASE {{ aae_db_name }} OWNER {{ aae_db_user }}
      TABLESPACE {{ aae_db_name }}_tbs TEMPLATE template0 ENCODING UTF8;
    GRANT ALL ON DATABASE {{ aae_db_name }} TO {{ aae_db_user }};
    EOSQL
        echo 'CREATED')"
  register: _aae
  changed_when: "'CREATED' in _aae.stdout"
  no_log: true
  when: deploy_app_engine | default(false) | bool

- name: PostgreSQL summary
  ansible.builtin.debug:
    msg:
      - "PostgreSQL ready at {{ postgres_host }}:{{ postgres_port }}"
      - "Databases created: {{ gcd_db_name }}, {{ docs_db_name }}, {{ dos_db_name }}, {{ tos_db_name }}, {{ icn_db_name }}, {{ bas_db_name }}"
