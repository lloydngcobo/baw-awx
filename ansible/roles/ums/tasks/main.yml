---
# Role: ums
# Deploys IBM User Management Service (UMS) 25.0.1 in the baw namespace.
# UMS is the OIDC identity provider for BAStudio, BAW, and App Engine.
# Registers OIDC clients: bastudio, psliberty.
# Connects to LDAP (ISVD) for user authentication.
#
# Container conventions (IBM UMS 25.0.1):
#   - Liberty server name: "ums"  (not "defaultServer")
#   - HTTP disabled (httpPort=-1); only HTTPS on 9443
#   - Mandatory config: /opt/ibm/wlp/usr/shared/resources/config/ums.xml
#   - Env vars: UMS_ADMINUSER, UMS_ADMINPASSWORD, UMS_SSLKEYSTOREPASSWORD, etc.
#   - Derby embedded database used (no external DB required)

# ── Secrets ───────────────────────────────────────────────────────────────────

- name: Create UMS credentials Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ums-secret
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-ums
      stringData:
        # Env var names MUST match what server.xml reads (${env.UMS_ADMINUSER}, etc.)
        # server.xml mappings: UMS_ADMINUSER→ums.admin.user, UMS_APICLIENTID→ums.api.clientId, etc.
        UMS_ADMINUSER:              "{{ ums_admin_user }}"
        UMS_ADMINPASSWORD:          "{{ ums_admin_password }}"
        UMS_SSLKEYSTOREPASSWORD:    "{{ keystore_password }}"
        UMS_JWTKEYSTOREPASSWORD:    "{{ keystore_password }}"
        UMS_LTPAPASSWORD:           "{{ ltpa_password }}"
        UMS_APICLIENTID:            "{{ ums_api_client_id }}"
        UMS_APICLIENTSECRET:        "{{ ums_api_client_secret }}"
        UMS_INTERNALCLIENTID:       "{{ ums_internal_client_id }}"
        UMS_INTERNALCLIENTSECRET:   "{{ ums_internal_client_secret }}"
        UMS_CLIENTMANAGERUSER:      "{{ ums_client_manager_user }}"
        UMS_CLIENTMANAGERPASSWORD:  "{{ ums_client_manager_pass }}"
        UMS_SCIMREADERUSER:         "{{ ums_scim_reader_user }}"
        UMS_SCIMREADERPASSWORD:     "{{ ums_scim_reader_pass }}"
        LDAP_BIND_PASSWORD:         "{{ ldap_bind_password }}"
  no_log: true

# ── UMS mandatory config (ums.xml) ───────────────────────────────────────────
# Mounted at /opt/ibm/wlp/usr/shared/resources/config/ums.xml (required by
# configDropins/overrides/customization.xml which cannot be changed).
# Sets Liberty variables + LDAP registry + Derby datasources.

- name: Create UMS config ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ums-config
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-ums
      data:
        ums.xml: |
          <?xml version="1.0" encoding="UTF-8"?>
          <server description="User Management Service">

            <!--
              Include the built-in SSO, SCIM, and OIDC registration feature configs.
              These files exist in the "ums" server directory and contain the
              openidConnectProvider, oauthProvider, SCIM API, and client-registration
              elements needed for BAW integration.
            -->
            <include optional="false" location="${server.config.dir}/sso.xml" />
            <include optional="false" location="${server.config.dir}/scim.xml" />
            <include optional="false" location="${server.config.dir}/registration.xml" />

            <!-- ── Required hostname variables ──────────────────────────── -->
            <variable name="ums.internalHostName"
                      value="ums-svc.{{ baw_namespace }}.svc.cluster.local:9443" />
            <variable name="ums.externalHostName"  value="{{ baw_hostname }}" />
            <variable name="ums.k8s.namespace"     value="{{ baw_namespace }}" />

            <!-- allInOneService = our K8s service name; drives virtualHost aliases -->
            <variable name="ums.networking.allInOneService"     value="ums-svc" />
            <variable name="ums.networking.allInOneServicePort" value="9443" />

            <!-- ── Non-secret client identifiers ─────────────────────────── -->
            <variable name="ums.api.clientId"             value="{{ ums_api_client_id }}" />
            <variable name="ums.oauth.internalClientId"   value="{{ ums_internal_client_id }}" />
            <variable name="ums.oauth.clientmanager.user" value="{{ ums_client_manager_user }}" />
            <variable name="ums.oauth.clientmanager.group" value="" />
            <variable name="ums.oauth.tokenmanager.group"  value="" />
            <variable name="ums.teamserver.admingroup"     value="" />
            <variable name="ums.scimReaderUser"           value="{{ ums_scim_reader_user }}" />

            <!-- ── Internal technical users (not in LDAP) ────────────────── -->
            <!-- Liberty merges <basicRegistry> elements with the same id.   -->
            <!-- basic-registry.xml already registers the admin user; this   -->
            <!-- block adds the clientManager and scimReader service accounts -->
            <!-- so UMS can auto-register OIDC clients and handle SCIM calls. -->
            <basicRegistry id="basicRegistry">
              <user name="${ums.oauth.clientmanager.user}"
                    password="${ums.oauth.clientmanager.password}" />
              <user name="${ums.scimReaderUser}"
                    password="${ums.scimReaderPassword}" />
            </basicRegistry>

            <!-- ── SSL — PKCS12 (override default JKS) ──────────────────── -->
            <variable name="ums.ssl.keystore.type"         value="PKCS12" />
            <variable name="ums.ssl.keystore.location"     value="/shared/tls/pkcs12/server.p12" />
            <variable name="ums.ssl.jwtKeystore.location"  value="/shared/tls/pkcs12/server.p12" />
            <variable name="ums.ssl.truststore.location"   value="/shared/tls/pkcs12/trusts.p12" />

            <!-- ── LTPA keys — stored in emptyDir-backed security dir ───── -->
            <variable name="ums.ltpa.location"
                      value="/opt/ibm/wlp/usr/shared/resources/security/ltpa/ltpa.keys" />

            <!-- ── Health check ──────────────────────────────────────────── -->
            <variable name="ums.health.autoDetection"              value="false" />
            <variable name="ums.health.disableCNCheck"             value="true" />
            <variable name="ums.health.disableCertificateCheck"    value="false" />
            <variable name="ums.health.useLocalHostAndPort"        value="true" />
            <variable name="ums.health.logHealthFailuresOnStartup" value="false" />

            <!-- ── LDAP registry for user authentication ─────────────────── -->
            <!-- baseDN must be the OU where users live (not the tree root).  -->
            <!-- With rdnProperty="cn", Liberty constructs bind DNs as        -->
            <!-- cn=<user>,<baseDN> — matching ISVD's actual entry format.    -->
            <ldapRegistry id="LDAPUserRegistry"
              realm="defaultWIMFileBasedRealm"
              host="{{ ldap_host }}"
              port="{{ ldap_port }}"
              baseDN="{{ ldap_user_base }}"
              bindDN="{{ ldap_bind_dn }}"
              bindPassword="${env.LDAP_BIND_PASSWORD}"
              ldapType="Custom">
              <ldapEntityType name="PersonAccount">
                <rdnProperty name="cn"/>
                <objectClass>inetOrgPerson</objectClass>
              </ldapEntityType>
              <ldapEntityType name="Group">
                <rdnProperty name="cn"/>
                <objectClass>groupOfNames</objectClass>
                <memberAttribute name="member"/>
              </ldapEntityType>
              <userFilter  filter="(&amp;(uid=%v)(objectclass=inetOrgPerson))"/>
              <groupFilter filter="(&amp;(cn=%v)(objectclass=groupOfNames))"/>
              <userIdMap      filter="uid"/>
              <groupIdMap     filter="cn"/>
              <groupMemberIdMap filter="member"/>
            </ldapRegistry>

            <!--
              ── Derby embedded databases (homelab) ───────────────────────────
              Derby is bundled in the UMS image (DerbyEmbeddedLib defined in
              server.xml). No external DB or JDBC driver needed.
              IMPORTANT: data is ephemeral (lost on pod restart). Ansible
              re-registers OIDC clients on each deployment run, so this is
              acceptable for homelab use.
            -->
            <dataSource id="oauthDatasource" jndiName="jdbc/oauthDerbyDS">
              <jdbcDriver libraryRef="DerbyEmbeddedLib"/>
              <properties.derby.embedded databaseName="UMSDB" createDatabase="create"/>
            </dataSource>

            <dataSource id="tsDatasource" jndiName="jdbc/teamserverDerbyDS">
              <jdbcDriver libraryRef="DerbyEmbeddedLib"/>
              <properties.derby.embedded databaseName="TSDB" createDatabase="create"/>
            </dataSource>

          </server>

# ── Deployment ────────────────────────────────────────────────────────────────

- name: Deploy UMS
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ums
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-ums
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: baw-ums
        template:
          metadata:
            labels:
              app: baw-ums
          spec:
            imagePullSecrets:
              - name: ibm-entitlement-key
            securityContext:
              runAsUser: 1000140000
              fsGroup: 1000140000
            containers:
              - name: ums
                image: "{{ ums_image }}"
                imagePullPolicy: IfNotPresent
                ports:
                  - containerPort: 9443
                    name: https
                envFrom:
                  - secretRef:
                      name: ums-secret
                env:
                  - name: disableFIPS
                    value: "true"
                  - name: TZ
                    value: "{{ timezone }}"
                  - name: JVM_HEAP_XMS
                    value: "512m"
                  - name: JVM_HEAP_XMX
                    value: "1024m"
                  # Required by server.xml httpAccessLogging element
                  - name: UMS_ACCESS_LOG_DIR
                    value: "/logs/application"
                resources:
                  requests:
                    memory: 512Mi
                    cpu: 250m
                  limits:
                    memory: 2Gi
                    cpu: "1"
                # UMS exposes only HTTPS on port 9443; use tcpSocket probes
                startupProbe:
                  tcpSocket:
                    port: 9443
                  periodSeconds: 15
                  failureThreshold: 30
                livenessProbe:
                  tcpSocket:
                    port: 9443
                  initialDelaySeconds: 90
                  periodSeconds: 30
                  failureThreshold: 8
                readinessProbe:
                  tcpSocket:
                    port: 9443
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  failureThreshold: 12
                volumeMounts:
                  # Mandatory ums.xml at the path required by customization.xml
                  - name: ums-global-config
                    mountPath: /opt/ibm/wlp/usr/shared/resources/config
                  # Writable directory for auto-generated LTPA keys
                  - name: security-dir
                    mountPath: /opt/ibm/wlp/usr/shared/resources/security
                  # TLS certificates (PKCS12) referenced from ums.xml
                  - name: tls
                    mountPath: /shared/tls/pkcs12
            volumes:
              # ConfigMap filtered to ums.xml only → placed at shared/resources/config/
              - name: ums-global-config
                configMap:
                  name: ums-config
                  items:
                    - key: ums.xml
                      path: ums.xml
              # EmptyDir provides a writable /shared/resources/security/ for LTPA keys
              - name: security-dir
                emptyDir: {}
              - name: tls
                configMap:
                  name: shared-ssl-config
                  items:
                    - key: server.p12
                      path: server.p12
                    - key: trusts.p12
                      path: trusts.p12

# ── Service ───────────────────────────────────────────────────────────────────

- name: Create UMS Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: ums-svc
        namespace: "{{ baw_namespace }}"
        labels:
          app: baw-ums
      spec:
        selector:
          app: baw-ums
        ports:
          - port: 9443
            targetPort: 9443
            name: https

# ── Wait ──────────────────────────────────────────────────────────────────────

- name: Wait for UMS deployment rollout
  ansible.builtin.shell: >
    oc rollout status deployment/ums
    -n {{ baw_namespace }} --timeout={{ pod_ready_timeout }}s
  changed_when: false

- name: Get UMS pod name
  ansible.builtin.shell: >
    oc get pod -n {{ baw_namespace }} -l app=baw-ums
    -o jsonpath='{.items[0].metadata.name}'
  register: _ums_pod
  changed_when: false

- name: Wait for UMS HTTPS endpoint to respond
  ansible.builtin.shell: >
    oc exec -n {{ baw_namespace }} {{ _ums_pod.stdout }} --
    curl -sk -o /dev/null -w "%{http_code}"
    https://localhost:9443/ums/
  register: _ums_health
  until: _ums_health.stdout in ['200', '302', '401', '403']
  retries: 30
  delay: 15
  changed_when: false

# ── OIDC client registration ──────────────────────────────────────────────────
# Registers the BAStudio OIDC client in UMS via its admin REST API.
# Idempotent: checks before creating.
# OIDC provider id is "ums" (lowercase) → endpoint /oidc/endpoint/ums/

- name: Check if BAStudio OIDC client already registered
  ansible.builtin.shell: |
    oc exec -n {{ baw_namespace }} {{ _ums_pod.stdout }} --
    curl -sk -u {{ ldap_admin_user }}:{{ ldap_admin_password }}
    "https://localhost:9443/oidc/endpoint/ums/registration/bastudio"
    -w "\n%{http_code}" 2>&1 | tail -1
  register: _bastudio_client_check
  changed_when: false
  no_log: true

- name: Register BAStudio OIDC client
  ansible.builtin.shell: |
    oc exec -n {{ baw_namespace }} {{ _ums_pod.stdout }} --
    curl -sk -u {{ ldap_admin_user }}:{{ ldap_admin_password }}
    -X POST "https://localhost:9443/oidc/endpoint/ums/registration"
    -H "Content-Type: application/json"
    -d '{
      "client_id": "bastudio",
      "client_secret": "{{ bastudio_oidc_client_secret }}",
      "client_name": "BAStudio",
      "redirect_uris": [
        "https://{{ baw_hostname }}/bas/redirect_uri",
        "https://{{ baw_hostname }}/bas/jsp/logoutCallback.jsp"
      ],
      "grant_types": ["authorization_code","refresh_token","client_credentials"],
      "response_types": ["code"],
      "token_endpoint_auth_method": "client_secret_post",
      "scope": "openid profile email"
    }' 2>&1
  register: _bastudio_client_reg
  changed_when: true
  no_log: true
  when: _bastudio_client_check.stdout != '200'

- name: Check if PSLiberty OIDC client already registered
  ansible.builtin.shell: |
    oc exec -n {{ baw_namespace }} {{ _ums_pod.stdout }} --
    curl -sk -u {{ ldap_admin_user }}:{{ ldap_admin_password }}
    "https://localhost:9443/oidc/endpoint/ums/registration/psliberty"
    -w "\n%{http_code}" 2>&1 | tail -1
  register: _psliberty_client_check
  changed_when: false
  no_log: true

- name: Register PSLiberty OIDC client
  ansible.builtin.shell: |
    oc exec -n {{ baw_namespace }} {{ _ums_pod.stdout }} --
    curl -sk -u {{ ldap_admin_user }}:{{ ldap_admin_password }}
    -X POST "https://localhost:9443/oidc/endpoint/ums/registration"
    -H "Content-Type: application/json"
    -d '{
      "client_id": "psliberty",
      "client_secret": "{{ ums_internal_client_secret }}",
      "client_name": "PSLiberty",
      "redirect_uris": ["https://{{ baw_hostname }}/bas/redirect_uri"],
      "grant_types": ["authorization_code","refresh_token","client_credentials","password"],
      "response_types": ["code"],
      "token_endpoint_auth_method": "client_secret_post",
      "scope": "openid profile email"
    }' 2>&1
  register: _psliberty_reg
  changed_when: true
  failed_when: >
    _psliberty_reg.rc != 0 and
    'already exists' not in _psliberty_reg.stdout | lower
  no_log: true
  when: _psliberty_client_check.stdout != '200'

- name: UMS summary
  ansible.builtin.debug:
    msg:
      - "UMS ready at https://ums-svc.{{ baw_namespace }}.svc.cluster.local:9443"
      - "UMS URL         : https://{{ baw_hostname }}/ums/"
      - "OIDC issuer     : https://{{ baw_hostname }}/oidc/endpoint/ums"
      - "OIDC clients    : bastudio, psliberty"
